<!DOCTYPE html>
<html lang="en">

<head>

  <!-- analytics and ads, started once the page has finished loading rather than racing it.
       between them they are ~380 KiB of javascript that nothing on screen needs: in the
       head they competed with the app's own bundle and the case art for a phone's
       bandwidth, and every long task on the main thread was theirs. they still run, and
       gtag still records the page view, they just stop being on the critical path.
       the queues below exist because gtag() and adsbygoogle are called by the app before
       either script is fetched; both are designed to replay a pre-seeded array. -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-QMWHYXJ6YE');

    window.adsbygoogle = window.adsbygoogle || [];

    (function () {
      var started = false;
      function start() {
        if (started) return;
        started = true;
        [
          'https://www.googletagmanager.com/gtag/js?id=G-QMWHYXJ6YE',
          'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8052282199595049'
        ].forEach(function (src) {
          var s = document.createElement('script');
          s.src = src;
          s.async = true;
          s.crossOrigin = 'anonymous';
          document.head.appendChild(s);
        });
      }
      // whichever comes first: the load event, or a few seconds. the timer is the safety
      // net for a load event that never fires because something else stalled.
      if (document.readyState === 'complete') start();
      else window.addEventListener('load', start, { once: true });
      setTimeout(start, 5000);
    })();
  </script>


  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/ran.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- montserrat, self-hosted and preloaded. from google it arrived two hops late (html ->
       css -> woff2 on another origin) and the swap relaid the page out once it landed.
       from our own origin the browser starts it with the html, so the text is drawn in
       the real font the first time. one variable file covers weights 400-800. -->
  <link rel="preload" as="font" type="font/woff2" href="/fonts/montserrat-latin.woff2" crossorigin />

  <!-- Primary Meta Tags -->
  <title>KaniCasino</title>
  <meta name="title" content="KaniCasino" />
  <meta name="description"
    content="KaniCasino is a case opening website where you can open cases of Touhou, CS2, anything! No real money involved." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kanicasino.com/" />
  <meta property="og:title" content="KaniCasino" />
  <meta property="og:description"
    content="KaniCasino is a case opening website where you can open cases of Touhou, CS2, anything! No real money involved." />
  <meta property="og:image" content="https://i.imgur.com/2NEJRGB.jpg" />

  <!-- inline so the boot screen needs no extra request to paint -->
  <style>
    .boot {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .boot-ring {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255, 255, 255, 0.14);
      border-top-color: #605bff;
      border-radius: 50%;
      animation: boot-spin 0.8s linear infinite;
    }

    .boot-word {
      margin: 0;
      font-family: Montserrat, ui-sans-serif, system-ui, sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.32em;
      text-indent: 0.32em;
      color: #6f6b93;
    }

    @keyframes boot-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .boot-ring {
        animation-duration: 2.4s;
      }
    }
  </style>

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://kanicasino.com/" />
  <meta property="twitter:title" content="KaniCasino" />
  <meta property="twitter:description"
    content="KaniCasino is a case opening website where you can open cases of Touhou, CS2, anything! No real money involved." />
  <meta property="twitter:image" content="https://i.imgur.com/2NEJRGB.jpg" />

</head>

<body style="margin: 0; padding: 0;">
  <div id="root"
    style="background: linear-gradient(322deg, rgba(21, 18, 37, 1) 71%, rgba(62, 42, 92, 1) 100%); height: 100vh; margin: 0; padding: 0;">
    <!-- painted straight from the html, so something is on screen while the bundle is
         still downloading instead of an empty gradient. react drops it on first render,
         and the suspense fallback repeats it so there is no blank frame in between. -->
    <div class="boot">
      <div class="boot-ring"></div>
      <p class="boot-word">KANICASINO</p>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>


</html>
